name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.5)'
        required: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          sed -i "s/^APP_VERSION = .*/APP_VERSION = \"${VERSION}\"/" utils/constants.py
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks

      - name: Build APK
        run: |
          (yes || true) | uv run flet build apk \
            --project "Portfolio Manager" \
            --android-signing-key-store /tmp/release.jks \
            --android-signing-key-store-password "${{ secrets.KEYSTORE_PASSWORD }}" \
            --android-signing-key-password "${{ secrets.KEY_PASSWORD }}" \
            --android-signing-key-alias upload

      - name: Rename APK
        run: mv build/apk/*.apk build/apk/portfolio-manager.apk

      - uses: actions/upload-artifact@v4
        with:
          name: portfolio-manager-android
          path: build/apk/portfolio-manager.apk

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          sed -i "s/^APP_VERSION = .*/APP_VERSION = \"${VERSION}\"/" utils/constants.py
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Install dependencies
        run: uv sync

      - name: Build Linux
        run: (yes || true) | uv run flet build linux --project "Portfolio Manager"

      - name: Archive Linux build
        working-directory: build/linux
        run: zip -r ../../portfolio-manager-linux.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: portfolio-manager-linux
          path: portfolio-manager-linux.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          sed -i "s/^APP_VERSION = .*/APP_VERSION = \"${VERSION}\"/" utils/constants.py
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build Windows
        shell: bash
        run: (yes || true) | uv run flet build windows --project "Portfolio Manager"
        env:
          PYTHONIOENCODING: utf-8

      - name: Archive Windows build
        run: Compress-Archive -Path build\windows\* -DestinationPath portfolio-manager-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: portfolio-manager-windows
          path: portfolio-manager-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          sed -i '' "s/^APP_VERSION = .*/APP_VERSION = \"${VERSION}\"/" utils/constants.py
          sed -i '' "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build macOS
        run: (yes || true) | uv run flet build macos --project "Portfolio Manager"

      - name: Archive macOS build
        working-directory: build/macos
        run: zip -r -y ../../portfolio-manager-macos.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: portfolio-manager-macos
          path: portfolio-manager-macos.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-apk, build-linux, build-windows, build-macos]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          # Extract the section between ## [VERSION] and the next ## [ (or EOF)
          NOTES=$(awk -v ver="$VERSION" '
            BEGIN { found=0 }
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)
          # Write to file to preserve multiline content
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/portfolio-manager-android/portfolio-manager.apk
            artifacts/portfolio-manager-linux/portfolio-manager-linux.zip
            artifacts/portfolio-manager-windows/portfolio-manager-windows.zip
            artifacts/portfolio-manager-macos/portfolio-manager-macos.zip
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          body_path: /tmp/release_notes.md
