name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.5)'
        required: true
      notes:
        description: 'Custom release notes (optional)'
        required: false
        type: string

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build APK
        run: yes | uv run flet build apk --project Portfolio\ Manager

      - name: Rename APK
        run: mv build/apk/*.apk build/apk/portfolio-manager.apk

      - uses: actions/upload-artifact@v4
        with:
          name: portfolio-manager-android
          path: build/apk/portfolio-manager.apk

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Install dependencies
        run: uv sync

      - name: Build Linux
        run: yes | uv run flet build linux --project Portfolio\ Manager

      - name: Archive Linux build
        working-directory: build/linux
        run: zip -r ../../portfolio-manager-linux.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: portfolio-manager-linux
          path: portfolio-manager-linux.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build Windows
        shell: bash
        run: yes | uv run flet build windows --project "Portfolio Manager"
        env:
          PYTHONIOENCODING: utf-8

      - name: Archive Windows build
        run: Compress-Archive -Path build\windows\* -DestinationPath portfolio-manager-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: portfolio-manager-windows
          path: portfolio-manager-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build macOS
        run: yes | uv run flet build macos --project Portfolio\ Manager

      - name: Archive macOS build
        working-directory: build/macos
        run: zip -r ../../portfolio-manager-macos.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: portfolio-manager-macos
          path: portfolio-manager-macos.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-apk, build-linux, build-windows, build-macos]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/portfolio-manager-android/portfolio-manager.apk
            artifacts/portfolio-manager-linux/portfolio-manager-linux.zip
            artifacts/portfolio-manager-windows/portfolio-manager-windows.zip
            artifacts/portfolio-manager-macos/portfolio-manager-macos.zip
          tag_name: ${{ github.event.inputs.version }}
          name: "Release ${{ github.event.inputs.version }}"
          generate_release_notes: true
          body: ${{ github.event.inputs.notes }}
